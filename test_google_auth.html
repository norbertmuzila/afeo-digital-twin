<!DOCTYPE html>
<html>
<head>
    <title>Google Auth Test</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .google-btn { 
            background: white;
            color: #757575;
            border: 1px solid #dadce0;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .google-btn:hover { 
            background: #f5f5f5;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h2>Google Authentication Test</h2>
    <p>This tests if Google Identity Services is loaded correctly.</p>
    
    <button class="google-btn" id="testGoogleBtn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" width="18">
        Test Google Sign-In
    </button>
    
    <div id="result" style="margin-top: 20px;"></div>
    
    <script>
        document.getElementById('testGoogleBtn').addEventListener('click', () => {
            const resultDiv = document.getElementById('result');
            
            if (typeof google !== 'undefined') {
                resultDiv.innerHTML = '<strong style="color: green;">✅ Google Identity Services loaded successfully!</strong>';
                resultDiv.innerHTML += '<p>Google OAuth client is available and ready.</p>';
            } else {
                resultDiv.innerHTML = '<strong style="color: red;">❌ Google Identity Services not loaded!</strong>';
                resultDiv.innerHTML += '<p>Check your internet connection or script loading.</p>';
            }
        });
    </script>
</body>
</html>
